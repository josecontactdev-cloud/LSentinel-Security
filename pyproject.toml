[tool.black]
line-length = 88
target-version = ["py314"]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
]

ignore = []

[tool.pytest.ini_options]
pythonpath = [
    "src",
]

testpaths = [
    "tests",
]

python_files = [
    "test_*.py",
]

addopts = "-ra"